name: Deploy BrightSteps 2.0.2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BrightSteps
        uses: actions/checkout@v6

      - name: Checkout licensed UK phonics audio
        uses: actions/checkout@v6
        with:
          repository: hellodeborahuk/buzzphonics
          path: _buzzphonics
          persist-credentials: false

      - name: Build complete offline site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/audio/phonemes

          cp index.html styles.css app.js manifest.webmanifest service-worker.js \
             LICENSE THIRD_PARTY_NOTICES.md _site/

          cp -R icons _site/icons

          # Create the hidden file during deployment.
          touch _site/.nojekyll

          # Copy the licensed phonics audio into the published website.
          cp _buzzphonics/public/sounds/*.m4a _site/audio/phonemes/

          EXPECTED=(
            a ai air ar b c ch d e ear ee er f g h i igh j l m n ng
            o oa oi oo ooo or ow p qu r s sh t th u ur ure v w x y z
          )

          for sound in "${EXPECTED[@]}"; do
            test -s "_site/audio/phonemes/${sound}.m4a" || {
              echo "Missing audio file: ${sound}.m4a"
              exit 1
            }
          done

          AUDIO_COUNT=$(find _site/audio/phonemes \
            -maxdepth 1 \
            -type f \
            -name '*.m4a' | wc -l | tr -d ' ')

          echo "Installed ${AUDIO_COUNT} local phonics recordings"
          test "$AUDIO_COUNT" -ge 44

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload complete website
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
